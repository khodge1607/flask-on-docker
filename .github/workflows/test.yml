name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and run dev containers
        run: |
          docker compose up -d --build
          sleep 60
          curl --fail http://localhost:5001/ || exit 1
          docker compose down -v
